<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Quiz | B.Sc. Computer Science Academic Portal</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header"><div class="container header-inner"><a class="site-brand" href="index.html"><span>B.Sc. Computer Science Academic Portal</span></a><button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false"><span></span><span></span><span></span></button><nav class="site-nav" aria-label="Main navigation"><a href="index.html">Home</a><a href="semester-1.html">Semester 1</a><a href="lectures.html">Lecture Notes</a><a href="assignments.html">Assignments</a><a href="quizzes.html" class="active">Quizzes</a><a href="lab.html">Practical Lab</a><a href="question-bank.html">Question Bank</a><a href="ai-assistant.html" class="nav-ai">AI Assistant</a></nav></div></header>
  <main>
    <section class="page-title"><div class="container"><p class="eyebrow">Practice Quiz</p><h1 id="quiz-title">Loading Quiz</h1><p id="quiz-topic"></p><p id="quiz-note" class="quiz-note"></p><p id="last-score" class="quiz-note"></p></div></section>
    <section class="section">
      <div class="container quiz-shell">
        <p id="quiz-status" class="tag">Loading</p>
        <div id="quiz-box" class="content-block"></div>
        <p id="quiz-score" class="score-box" hidden></p>
        <div class="quiz-controls">
          <button class="button secondary" id="quiz-prev" type="button">Previous</button>
          <button class="button secondary" id="quiz-next" type="button">Next</button>
          <button class="button primary" id="quiz-submit" type="button">Submit Quiz</button>
          <button class="button primary" id="quiz-retry" type="button" hidden>Retry Quiz</button>
        </div>
      </div>
    </section>
  </main>
  <footer class="site-footer"><div class="container"><p>Department of Computer Science / Computer Applications</p><p>Govt. Degree College Bhoranj, Himachal Pradesh</p></div></footer>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/quiz-player.js"></script>
</body>
</html>
